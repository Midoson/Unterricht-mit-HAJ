  <script>
        // Function definitions for drawing graphs on canvases
        const functions = [
            { id: '1', fn: x => x*x, label: 'f(x) = x²' },
            { id: '2', fn: x => x*x*x, label: 'f(x) = x³' },
            { id: '3', fn: x => Math.pow(2, x), label: 'f(x) = 2ˣ' },
            { id: '4', fn: x => Math.cos(x), label: 'f(x) = cos(x)' },
            { id: '5', fn: x => Math.sin(x), label: 'f(x) = sin(x)' },
            { id: '6', fn: x => x*x + x, label: 'f(x) = x²+x' },
        ];

        function drawGraphs() {
            const cards = document.querySelectorAll('.graph-card');
            cards.forEach((card, i) => {
                const canvas = card.querySelector('.graph-canvas');
                const ctx = canvas.getContext('2d');
                const w = 120, h = 120, scale = 20;
                ctx.clearRect(0, 0, w, h);
                // axes
                ctx.strokeStyle = '#cbd5e1';
                ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(w/2,0); ctx.lineTo(w/2,h); ctx.moveTo(0,h/2); ctx.lineTo(w,h/2); ctx.stroke();
                // function
                ctx.strokeStyle = '#4f46e5';
                ctx.lineWidth = 2;
                ctx.beginPath();
                for (let px = 0; px < w; px++) {
                    const x = (px - w/2) / scale;
                    const y = functions[i].fn(x);
                    const py = h/2 - y * scale;
                    if (px === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
                }
                ctx.stroke();
            });
        }

        let score = 0, total = 6, placed = 0;

        // Drag and drop
        document.querySelectorAll('.graph-card').forEach(card => {
            card.addEventListener('dragstart', e => {
                e.dataTransfer.setData('text/plain', card.dataset.id + '|' + card.dataset.answer);
                card.style.opacity = '0.5';
            });
            card.addEventListener('dragend', e => { card.style.opacity = '1'; });
        });

        document.querySelectorAll('.drop-zone').forEach(zone => {
            zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
            zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
            zone.addEventListener('drop', e => {
                e.preventDefault();
                zone.classList.remove('drag-over');
                const [id, answer] = e.dataTransfer.getData('text/plain').split('|');
                const card = document.querySelector(`.graph-card[data-id="${id}"]`);
                if (!card || card.parentElement === zone) return;
                if (zone.dataset.category === answer) {
                    zone.appendChild(card);
                    card.draggable = false;
                    card.classList.add('correct');
                    card.style.borderColor = '#22c55e';
                    score++; placed++;
                } else {
                    card.classList.add('incorrect');
                    setTimeout(() => card.classList.remove('incorrect'), 400);
                }
                if (placed === total) {
                    document.getElementById('score-display').textContent = `${score}/${total} richtig!`;
                    document.getElementById('score-display').classList.remove('hidden');
                }
            });
        });

        function resetAll() {
            const tray = document.getElementById('card-tray');
            document.querySelectorAll('.graph-card').forEach(card => {
                card.draggable = true;
                card.style.borderColor = 'transparent';
                card.classList.remove('correct','incorrect');
                tray.appendChild(card);
            });
            score = 0; placed = 0;
            document.getElementById('score-display').classList.add('hidden');
        }

        drawGraphs();
    </script>
